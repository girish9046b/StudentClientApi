spring.application.name=studentclientapi
spring.application.version=1.1
spring.application.description=API documentation for student List and Details api.
server.port=8085
jwt.secret = secret

eureka.client.serviceUrl.defaultZone: ${EUREKA_URI:http://127.0.0.1:8761/eureka}
eureka.instance.preferIpAddress: true


#logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
#DEPENDENCIES FOR SPANID AND TRACE ID -DISTRIBUTED TRACING
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/
# Ensure logs include Trace and Span IDs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId:-},%X{spanId:-}] - %msg%n

#Java
#If you have Java 17 or higher installed, the quickest way to get started is to fetch the latest release as a self-contained executable jar:
#curl -sSL https://zipkin.io/quickstart.sh | bash -s
#java -jar zipkin.jar

#display only non-null values in json response
spring.jackson.default-property-inclusion=non_null
####################################	 START OF JPA CRUD DATASOURCE	########################

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/student
spring.datasource.username=studentdbuser
spring.datasource.password=Nagu@9046N
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

##Turn Statistics on and log SQL stmts
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##If want to see very extensive logging
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.type=trace
logging.level.org.hibernate.stat=debug

#Hibernate create the schema using entity classes 
spring.jpa.hibernate.ddl-auto=update
#spring.jpa.hibernate.ddl-auto=none //Schema will be created using schema.sql and data.sql files

spring.jackson.serialization.order-map-entries-by-keys=true

STUDENT.LIST.API.URL = http://localhost:8081/api/student/allList
STUDENT.DETAILS.API.URL = http://localhost:8080/api/student/studentDetails/{id}


